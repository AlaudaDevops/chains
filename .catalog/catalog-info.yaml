apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: chains-cve-fork
  title: Tekton Chains (CVE Fork)
  description: tektoncd/chains 的 Alauda fork，仅在历史版本上回填 CVE 补丁，用于解决产品已发布版本的依赖漏洞。不作为独立组件交付，补丁会被合入 tektoncd-chains 对应版本。
  tags:
    - cve-fork
    - internal-tool
    - go
  links:
    - url: https://github.com/AlaudaDevops/chains
      title: GitHub Repository
      icon: github
    - url: https://github.com/tektoncd/chains
      title: Upstream Repository
      icon: github
  annotations:
    # github plugin
    github.com/project-slug: AlaudaDevops/chains
    # backstage techdocs plugin — dir:../ points to the repo root from .catalog/
    backstage.io/techdocs-ref: dir:../
    acp.cpaas.io/owner: qingliu@alauda.io
    # internal — not delivered as a product component
    acp.cpaas.io/functional-attributes: internal
    # upstream open-source component info
    acp.cpaas.io/open-source-component-repo: https://github.com/tektoncd/chains
    acp.cpaas.io/open-source-component-license: Apache-2.0
    acp.cpaas.io/open-source-component-license_url: https://github.com/tektoncd/chains/blob/main/LICENSE

spec:
  type: library
  system: system:alauda-devops-internal
  lifecycle: experimental
  owner: devops
